<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AuthGate — Slides</title>
  <meta name="description" content="AuthGate presentation slides — available in Traditional Chinese and English.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0B1B3A;
      --navy-2: #122a55;
      --blue: #2C6FE0;
      --blue-light: #5b94f0;
      --text: #eaf0ff;
      --muted: #9fb0d4;
    }
    html, body { height: 100%; }
    body {
      background: radial-gradient(1200px 800px at 50% -10%, #16315f 0%, var(--navy) 55%, #08152e 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      line-height: 1.5;
    }
    .wrap { width: 100%; max-width: 720px; text-align: center; }

    .logo {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(44, 111, 224, 0.45));
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.9rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(0.95rem, 2.4vw, 1.1rem);
      max-width: 520px;
      margin: 0 auto 44px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }
    @media (max-width: 540px) {
      .choices { grid-template-columns: 1fr; }
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(120, 160, 240, 0.22);
      border-radius: 18px;
      padding: 30px 26px;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-4px);
      border-color: var(--blue);
      background: linear-gradient(180deg, rgba(44,111,224,0.18), rgba(44,111,224,0.05));
      box-shadow: 0 14px 36px rgba(8, 18, 46, 0.6);
      outline: none;
    }
    .card .flag { font-size: 2rem; line-height: 1; margin-bottom: 14px; }
    .card .lang { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .card .sub { color: var(--muted); font-size: 0.9rem; }
    .card .go {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: var(--blue-light);
      font-weight: 600;
      font-size: 0.92rem;
    }
    .card .go svg { transition: transform 0.18s ease; }
    .card:hover .go svg, .card:focus-visible .go svg { transform: translateX(4px); }

    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--blue-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <svg class="logo" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="470" y="300" width="260" height="200" rx="48" fill="#2C6FE0"></rect>
      <path d="M600 350c-44 0-80 36-80 80v34h36v-34c0-24 20-44 44-44s44 20 44 44v34h36v-34c0-44-36-80-80-80z" fill="#fff"></path>
      <circle cx="600" cy="452" r="20" fill="#fff"></circle>
      <rect x="592" y="452" width="16" height="34" rx="8" fill="#fff"></rect>
    </svg>

    <h1>AuthGate</h1>
    <p class="tagline">A lightweight Identity Gateway that unifies OAuth / OIDC authentication and JWT issuance. Choose your language to view the slides.</p>

    <div class="choices">
      <a class="card" href="authgate-zh-tw.html">
        <div class="flag">🇹🇼</div>
        <div class="lang">繁體中文</div>
        <div class="sub">Traditional Chinese</div>
        <span class="go">
          開始閱讀
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </a>

      <a class="card" href="authgate-eng.html">
        <div class="flag">🇬🇧</div>
        <div class="lang">English</div>
        <div class="sub">英文版</div>
        <span class="go">
          Start reading
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </span>
      </a>
    </div>

    <footer>
      Speaker: <strong>appleboy</strong> &nbsp;·&nbsp;
      <a href="https://github.com/go-authgate" target="_blank" rel="noopener">github.com/go-authgate</a>
    </footer>
  </main>
</body>
</html>
